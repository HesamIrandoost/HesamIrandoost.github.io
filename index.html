<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ubuntu Terminal Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: #300A24;
    font-family: monospace;
  }

  .terminal {
    background: #1e1e1e;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  .scrollbar::-webkit-scrollbar {
    width: 6px;
  }

  .scrollbar::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
  }
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-4xl terminal rounded-lg overflow-hidden">

  <!-- TOP BAR -->
  <div class="flex items-center gap-2 px-3 py-2 bg-gray-900">
    <span class="w-3 h-3 bg-red-500 rounded-full"></span>
    <span class="w-3 h-3 bg-yellow-500 rounded-full"></span>
    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
    <span class="ml-3 text-xs text-gray-400">Hesam@ubuntu: ~</span>
  </div>

  <!-- TERMINAL BODY -->
  <div id="terminal" class="p-4 h-[500px] overflow-y-auto scrollbar text-sm space-y-2">

    <div class="text-gray-300">
      Welcome to Ubuntu Portfolio Terminal 👋 <br/>
      Type <span class="text-white">help</span> to see commands
    </div>

  </div>

  <!-- INPUT -->
  <div class="flex items-center bg-black px-3 py-2">
    <span class="text-white">Hesam@portfolio:~$</span>
    <input id="input"
      class="bg-transparent flex-1 ml-2 outline-none text-green-400"
      autofocus
      autocomplete="off"
    />
  </div>

</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

const commands = {
  help: `
Available commands:
- about
- skills
- projects
- contact
- clear
  `,

  about: `
Hi 👋 I'm Hesam

Backend Developer (Django)
Frontend (Vue / Tailwind)
Interested in system design & clean code
  `,

  skills: `
Python  ██████████ 90%
Django  █████████ 85%
Vue     ████      40%
JavaScript ██      25%
Linux   █████████ 85%
  `,

  projects: `
1. Blog API (Django REST)
2. Portfolio Terminal UI
3. Todo App (Vue)
4. E-commerce Backend
  `,

  contact: `
Email: <a class="text-blue-400 underline" href="mailto:hesamirandoost14@gmail.com">hesamirandoost14@gmail.com</a><br>
GitHub: <a class="text-blue-400 underline" href="https://github.com/HesamIrandoost" target="_blank">github.com/HesamIrandoost</a><br>
LinkedIn: <a class="text-blue-400 underline" href="https://linkedin.com" target="_blank">Profile</a>
`
};

// چاپ خروجی
function print(text, isHTML = false, isError = false) {
  const div = document.createElement("div");

  div.className = isError
    ? "text-red-400 whitespace-pre-wrap"
    : "text-gray-300 whitespace-pre-wrap";

  if (isHTML) {
    div.innerHTML = text;
  } else {
    div.textContent = text;
  }

  terminal.appendChild(div);
  div.scrollIntoView({ behavior: "smooth" });
}

// اجرای دستور
function runCommand(cmd) {

  // نمایش خط تایپ شده
  const line = document.createElement("div");
  line.textContent = `Hesam@portfolio:~$ ${cmd}`;
  line.className = "text-white";
  terminal.appendChild(line);

  // clear
  if (cmd === "clear") {
    terminal.innerHTML = `
      <div class="text-gray-300">
        Terminal cleared. Type <span class="text-white">help</span>
      </div>
    `;
    input.focus();
    return;
  }

  // command exists
  if (commands[cmd]) {
    const isHTML = cmd === "contact";
    print(commands[cmd], isHTML);
  } else {
    print(`Command not found: ${cmd}`, false, true);
  }

  input.value = "";
  input.focus();
}

// input handler
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const cmd = input.value.trim();
    if (cmd) runCommand(cmd);
  }
});

// همیشه فوکوس
window.addEventListener("click", () => input.focus());
</script>

</body>
</html>
