<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ubuntu Terminal Portfolio</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    background: #300A24;
    font-family: monospace;
  }

  .terminal {
    background: #1e1e1e;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
  }

  .scrollbar::-webkit-scrollbar {
    width: 6px;
  }

  .scrollbar::-webkit-scrollbar-thumb {
    background: #444;
    border-radius: 10px;
  }
</style>
</head>

<body class="flex items-center justify-center min-h-screen">

<div class="w-full max-w-4xl terminal rounded-lg overflow-hidden">

  <!-- TOP BAR -->
  <div class="flex items-center gap-2 px-3 py-2 bg-gray-900">
    <span class="w-3 h-3 bg-red-500 rounded-full"></span>
    <span class="w-3 h-3 bg-yellow-500 rounded-full"></span>
    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
    <span class="ml-3 text-xs text-gray-400">HesamIrandoost@ubuntu: ~</span>
  </div>

  <!-- TERMINAL BODY -->
  <div id="terminal" class="p-4 h-[500px] overflow-y-auto scrollbar text-sm text-green-400 space-y-2">

    <div class="text-gray-300">
      Welcome to Ubuntu Portfolio Terminal 👋 <br/>
      Type <span class="text-white">help</span> to see commands
    </div>

  </div>

  <!-- INPUT -->
  <div class="flex items-center bg-black px-3 py-2">
    <span class="text-white">HesamIrandoost@portfolio:~$</span>
    <input id="input"
      class="bg-transparent flex-1 ml-2 outline-none text-green-400"
      autofocus
      autocomplete="off"
    />
  </div>

</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

const commands = {
  help: `
Available commands:
- about
- skills
- projects
- contact
- clear
  `,

  about: `
Hi 👋 I'm HesamIrandoost

Backend Developer (Django)
Frontend (Vue / Tailwind)
Interested in system design & clean code
  `,

  skills: `
Python  ██████████ 90%
Django  █████████ 85%
Vue     ████      40%
JS      ██        25%
lpic1   █████████ 85%
  `,

  projects: `
1. Blog API (Django REST)
2. Portfolio Terminal UI (this)
3. Todo App (Vue)
4. E-commerce Backend
  `,

  contact: `
Email: hesamirandoost14@gmail.com
GitHub: github.com/HesamIrandoost
LinkedIn: linkedin.com/in/hesam-irandoost-0a7b58366/
  `
};

function print(text) {
  const div = document.createElement("div");
  div.className = "text-gray-300 whitespace-pre-wrap";
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function runCommand(cmd) {
  const line = document.createElement("div");
  line.innerHTML = `<span class="text-white">HesamIrandoost@portfolio:~$</span> ${cmd}`;
  terminal.appendChild(line);

  if (cmd === "clear") {
    terminal.innerHTML = "";
    return;
  }

  if (commands[cmd]) {
    print(commands[cmd]);
  } else {
    print(`Command not found: ${cmd}`);
  }

  terminal.scrollTop = terminal.scrollHeight;
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const cmd = input.value.trim();
    if (cmd) runCommand(cmd);
    input.value = "";
  }
});
</script>

</body>
</html>
